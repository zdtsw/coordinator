apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: ${PREFILL_POOL_NAME}
spec:
  selector:
    matchLabels:
      app: ${PREFILL_POOL_NAME}
  endpointPickerRef:
    name: ${EPP_NAME_P}
    kind: Service
    port:
      number: 9002
  # TARGET_PORTS is a pre-formatted YAML block-sequence fragment produced by
  # kind-dev-env.sh. It begins with a newline and carries its own
  # "  - number: <port>" lines at this indentation level.
  targetPorts: ${TARGET_PORTS}
---
apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: ${DECODE_POOL_NAME}
spec:
  selector:
    matchLabels:
      app: ${DECODE_POOL_NAME}
  endpointPickerRef:
    name: ${EPP_NAME_D}
    kind: Service
    port:
      number: 9002
  targetPorts: ${TARGET_PORTS}
