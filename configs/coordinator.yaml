server:
  listen_addr: ":8080"
  read_timeout: 30s
  write_timeout: 120s

gateway:
  address: "http://envoy-gateway:80"
  max_idle_conns_per_host: 100
  idle_conn_timeout: 90s
  timeout: 60s
  use_openai_format: true    # env: COORDINATOR_GATEWAY_USE_OPENAI_FORMAT

rendering_service:
  address: "http://rendering-service:8080"

pipeline:
  kv_connector: nixlv2          # nixlv2 | shared_storage
  ec_connector: shared_storage  # shared_storage | nixlv2
  steps:
    - type: replace-media-urls
      params:
        download_timeout: 10s
        max_concurrent_downloads: 10
    - type: render
      params:
        endpoint: "/v1/chat/completions/render"
    #- type: conditional-decode
    - type: encode
      params:
        max_parallel: 8
    - type: prefill
    - type: decode
