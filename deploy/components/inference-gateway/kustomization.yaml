# ------------------------------------------------------------------------------
# Inference Gateway
#
# Provides the Gateway, dual InferencePools (prefill + decode), HTTPRoutes with
# path-prefix routing, EPP ServiceAccounts, RBAC, and EPP Services for the
# P/D coordinator deployment.
# ------------------------------------------------------------------------------
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- service-accounts.yaml
- rbac.yaml
- inference-pools.yaml
- services.yaml
- deployments.yaml
- gateways.yaml
- httproutes.yaml
