  - name: inference-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /prefill
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - group: inference.networking.k8s.io
      kind: InferencePool
      name: ${PREFILL_POOL_NAME}
      port: 8000
    timeouts:
      request: 30s
---

